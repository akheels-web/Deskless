services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - ./postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: postgres://helpdesk:${DB_PASSWORD}@db:5432/helpdesk

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./media:/app/media

    ports:
      - "8000:8000"

volumes: {}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: ${DB_PASSWORD:-helpdesk}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://helpdesk:${DB_PASSWORD:-helpdesk}@db:5432/helpdesk
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ brand_name }}{% endblock %} · {{ brand_name }}</title>
  <style>
    :root {
      --rail: {{ brand_color }};
      --accent: {{ brand_accent }};
      --canvas: #f6f7f9;
      --surface: #ffffff;
      --ink: #0f1419;
      --muted: #5b6672;
      --faint: #8a94a0;
      --line: #e6e9ee;
      --line-strong: #d4d9e0;
      --amber: #b45309;
      --amber-bg: #fef6e7;
      --green: #157347;
      --green-bg: #e8f4ec;
      --red: #c02626;
      --red-bg: #fbe9e9;
      --grey: #64707d;
      --grey-bg: #eef1f4;
      --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --radius: 4px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; background: var(--canvas); color: var(--ink);
      font-family: var(--sans); font-size: 14px; line-height: 1.5;
      font-variant-numeric: tabular-nums;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---- shell: fixed rail + content ---- */
    .shell { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }
    .rail {
      background: var(--rail); color: #fff; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh;
    }
    .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 20px; }
    .brand strong { font-size: 17px; letter-spacing: -0.3px; }
    .rail nav { display: flex; flex-direction: column; gap: 2px; }
    .rail nav a {
      color: #cdd4dc; padding: 8px 10px; border-radius: var(--radius);
      display: flex; align-items: center; gap: 10px; font-weight: 500;
    }
    .rail nav a:hover { background: rgba(255,255,255,.08); color: #fff; text-decoration: none; }
    .rail nav a.active { background: rgba(255,255,255,.14); color: #fff; }
    .rail .spacer { flex: 1; }
    .rail .who { color: #9aa5b1; font-size: 12px; padding: 8px 10px; border-top: 1px solid rgba(255,255,255,.12); }
    .rail .who a { color: #cdd4dc; }

    .content { padding: 0; min-width: 0; }
    .topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 32px; border-bottom: 1px solid var(--line); background: var(--surface);
      position: sticky; top: 0; z-index: 5;
    }
    .topbar h1 { font-size: 19px; font-weight: 650; letter-spacing: -0.3px; margin: 0; }
    .topbar .grow { flex: 1; }
    main { padding: 24px 32px 64px; max-width: 1120px; }

    /* ---- signature: ticket ref in mono ---- */
    .ref { font-family: var(--mono); font-size: 12.5px; color: var(--faint); letter-spacing: .3px; white-space: nowrap; }
    .ref-lg { font-family: var(--mono); font-size: 14px; color: var(--muted); }

    /* ---- controls ---- */
    input, textarea, select {
      font: inherit; color: var(--ink); background: var(--surface);
      border: 1px solid var(--line-strong); border-radius: var(--radius); padding: 8px 10px;
    }
    input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
    textarea { width: 100%; resize: vertical; }
    label { font-weight: 550; font-size: 13px; color: var(--muted); }
    .btn {
      display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
      padding: 8px 15px; background: var(--accent); color: #fff; border: 1px solid var(--accent);
      border-radius: var(--radius); font: inherit; font-weight: 600; line-height: 1;
    }
    .btn:hover { filter: brightness(.94); text-decoration: none; }
    .btn.ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }
    .btn.ghost:hover { background: var(--canvas); filter: none; }

    /* ---- cards / panels ---- */
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; }
    .card + .card { margin-top: 16px; }
    .card .hd { padding: 14px 18px; border-bottom: 1px solid var(--line); font-weight: 600; }
    .card .bd { padding: 18px; }

    /* ---- badges & priority ---- */
    .badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
      border-radius: 100px; font-size: 12px; font-weight: 600; line-height: 1.4;
    }
    .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .9; }
    .s-open { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, #fff); }
    .s-in_progress { color: #6d28d9; background: #f1ecfb; }
    .s-pending { color: var(--amber); background: var(--amber-bg); }
    .s-escalated { color: var(--red); background: var(--red-bg); }
    .s-closed { color: var(--grey); background: var(--grey-bg); }
    .badge.overdue { color: #fff; background: var(--red); }
    .badge.overdue::before { background: #fff; }
    .prio { font-size: 12px; font-weight: 600; }
    .p-low { color: var(--faint); } .p-normal { color: var(--muted); }
    .p-high { color: var(--amber); } .p-urgent { color: var(--red); }

    /* ---- queue table ---- */
    .queue { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
    .queue th {
      text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
      color: var(--faint); font-weight: 600; padding: 11px 14px; border-bottom: 1px solid var(--line); background: #fbfcfd;
    }
    .queue td { padding: 13px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .queue tr:last-child td { border-bottom: 0; }
    .queue tbody tr { position: relative; }
    .queue tbody tr:hover { background: #fbfcfd; }
    /* priority spine — the left rule encodes urgency at a glance */
    .queue td.spine { padding: 0; width: 3px; }
    .queue td.spine > span { display: block; width: 3px; height: 44px; background: transparent; }
    tr.pr-high td.spine > span { background: var(--amber); }
    tr.pr-urgent td.spine > span { background: var(--red); }
    .subj { font-weight: 550; color: var(--ink); }
    .subj:hover { color: var(--accent); }
    .meta { color: var(--muted); font-size: 13px; }

    /* ---- queue left-panel layout ---- */
    .queue-layout { display: grid; grid-template-columns: 200px 1fr; gap: 22px; align-items: start; max-width: 1120px; }
    .views { display: flex; flex-direction: column; gap: 2px; }
    .view-link { display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 9px 12px; border-radius: var(--radius); color: var(--muted); font-weight: 550; }
    .view-link:hover { background: var(--surface); color: var(--ink); text-decoration: none; }
    .view-link.on { background: var(--surface); color: var(--ink); box-shadow: inset 2px 0 0 var(--accent); }
    .view-link .count { font-size: 12px; color: var(--faint); background: var(--canvas); padding: 1px 8px; border-radius: 100px; font-variant-numeric: tabular-nums; }
    .view-link.on .count { background: color-mix(in srgb, var(--accent) 12%, #fff); color: var(--accent); }
    .queue-main { min-width: 0; }
    .views-heading { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--faint);
      font-weight: 600; padding: 14px 12px 6px; }
    .tag { display: inline-block; padding: 1px 8px; border-radius: 100px; font-size: 12px;
      background: var(--grey-bg); color: var(--muted); }
    .attach { display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px;
      border: 1px solid var(--line-strong); border-radius: var(--radius); font-size: 13px; color: var(--ink); }
    .attach:hover { border-color: var(--accent); text-decoration: none; }

    /* ---- filter bar ---- */
    .filters { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .chip {
      padding: 5px 12px; border-radius: 100px; border: 1px solid var(--line-strong);
      color: var(--muted); font-size: 13px; font-weight: 550; background: var(--surface);
    }
    .chip:hover { border-color: var(--faint); text-decoration: none; }
    .chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
    .filters form { display: flex; gap: 6px; margin-left: auto; }

    /* ---- conversation thread ---- */
    .thread { display: flex; flex-direction: column; gap: 2px; }
    .msg { display: grid; grid-template-columns: 34px 1fr; gap: 12px; padding: 14px 0; border-top: 1px solid var(--line); }
    .msg:first-child { border-top: 0; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--rail); color: #fff; display: grid; place-items: center; font-weight: 650; font-size: 13px; }
    .msg .who { font-weight: 600; }
    .msg .when { color: var(--faint); font-size: 12.5px; }
    .msg .text { margin-top: 4px; white-space: pre-wrap; }
    .msg.note { background: var(--amber-bg); margin: 0 -18px; padding: 14px 18px; border-radius: var(--radius); border-top-color: transparent; }
    .msg.note .avatar { background: var(--amber); }
    .note-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--amber); }

    /* ---- stat tiles (reports) ---- */
    .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .tile { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 18px; }
    .tile .n { font-size: 30px; font-weight: 680; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
    .tile .k { color: var(--muted); font-size: 13px; margin-top: 2px; }
    a.tile.stat { display: block; }
    a.tile.stat:hover { border-color: var(--accent); text-decoration: none; box-shadow: 0 1px 6px rgba(15,20,25,.06); }
    /* dashboard list rows */
    .dash-row { display: grid; grid-template-columns: 74px 1fr auto; gap: 12px; align-items: center;
      padding: 12px 18px; border-bottom: 1px solid var(--line); color: var(--ink);
      border-left: 3px solid transparent; }
    .dash-row:last-child { border-bottom: 0; }
    .dash-row:hover { background: #fbfcfd; text-decoration: none; }
    .dash-row.pr-high { border-left-color: var(--amber); }
    .dash-row.pr-urgent { border-left-color: var(--red); }
    .dash-row .subj { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* horizontal bar rows */
    .bar { display: grid; grid-template-columns: 90px 1fr 40px; align-items: center; gap: 12px; padding: 7px 0; }
    .bar .track { display: block; height: 8px; background: var(--canvas); border-radius: 100px; overflow: hidden; }
    .bar .fill { display: block; height: 100%; min-width: 2px; background: var(--accent); border-radius: 100px; }
    .bar .val { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }

    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; }
    .field input, .field textarea, .field select { width: 100%; }
    .row { display: flex; gap: 14px; } .row > * { flex: 1; }
    .empty { text-align: center; color: var(--faint); padding: 56px 20px; }
    .pager { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 20px; color: var(--muted); }
    .hint { color: var(--muted); font-size: 13px; }
    .errorlist { color: var(--red); list-style: none; padding: 0; margin: 4px 0 0; font-size: 13px; }

    /* ---- public / auth shell (no rail) ---- */
    .public { min-height: 100vh; display: grid; place-items: center; padding: 32px 20px;
      background: radial-gradient(120% 120% at 50% -10%, color-mix(in srgb, var(--rail) 8%, var(--canvas)) 0%, var(--canvas) 55%); }
    .public-card { width: 100%; max-width: 460px; }
    .public-brand { display: flex; align-items: center; gap: 11px; justify-content: center; margin-bottom: 22px; }
    .public-brand strong { font-size: 20px; letter-spacing: -0.4px; }
    .public .card .bd { padding: 26px; }
    .public h1 { font-size: 20px; font-weight: 660; letter-spacing: -0.3px; margin: 0 0 4px; }
    .public .lede { color: var(--muted); margin: 0 0 22px; }
    .sso-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 14px; color: var(--faint); font-size: 12.5px; }
    .sso-divider::before, .sso-divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
    .sso-buttons { display: flex; flex-direction: column; gap: 8px; }
    .sso-btn { justify-content: center; }

    @media (max-width: 760px) {
      .shell { grid-template-columns: 1fr; }
      .rail { position: static; height: auto; flex-direction: row; align-items: center; flex-wrap: wrap; }
      .rail nav { flex-direction: row; flex-wrap: wrap; }
      .rail .spacer, .rail .who { display: none; }
      .topbar, main { padding-left: 16px; padding-right: 16px; }
      .queue thead { display: none; }
      .msg.note { margin: 0; }
      .queue-layout { grid-template-columns: 1fr; }
      .views { flex-direction: row; flex-wrap: wrap; }
    }
    @media (prefers-reduced-motion: no-preference) { .btn, .chip, .subj { transition: all .12s ease; } }
  </style>
</head>
<body>
{% block body %}
  <div class="shell">
    <aside class="rail">
      <div class="brand">
        {% if brand_logo %}
          <img src="{{ brand_logo }}" alt="{{ brand_name }}" style="max-height:28px; max-width:150px; object-fit:contain;">
        {% else %}
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <path d="M6 5h20a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H13l-7 5v-5a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3Z"
                  stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
            <path d="M11 14.5l3.5 3.5L22 10.5" stroke="{{ brand_accent }}"
                  stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <strong>{{ brand_name }}</strong>
        {% endif %}
      </div>
      {% if user.is_authenticated %}
      <nav>
        <a href="{% url 'dashboard' %}" class="{% block nav_home %}{% endblock %}">Dashboard</a>
        <a href="{% url 'ticket_list' %}" class="{% block nav_queue %}{% endblock %}">Queue</a>
        <a href="{% url 'reports' %}" class="{% block nav_reports %}{% endblock %}">Reports</a>
        {% if user.is_superuser %}
        <a href="{% url 'team' %}" class="{% block nav_team %}{% endblock %}">Team</a>
        <a href="{% url 'org_settings' %}" class="{% block nav_settings %}{% endblock %}">Settings</a>
        {% endif %}
        <a href="{% url 'submit_ticket' %}">Intake form</a>
      </nav>
      <div class="spacer"></div>
      <div class="who">
        Signed in as <strong>{{ user.username }}</strong><br>
        <a href="{% url 'logout' %}">Sign out</a>
      </div>
      {% endif %}
    </aside>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>
{% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}{{ article.title }}{% endblock %}
{% block body %}
<div class="public" style="align-items:flex-start;">
  <div class="public-card" style="max-width:720px; margin-top:40px;">
    <p style="margin-bottom:12px;"><a href="{% url 'kb_list' %}">← All articles</a></p>
    <div class="card"><div class="bd">
      <h1>{{ article.title }}</h1>
      {% if article.category %}<span class="tag">{{ article.category.name }}</span>{% endif %}
      <div class="text" style="margin-top:16px; white-space:pre-wrap;">{{ article.body|safe }}</div>
    </div></div>
    <p class="hint" style="margin-top:14px;">Didn't find your answer? <a href="{% url 'submit_ticket' %}">Contact support</a>.</p>
  </div>
</div>
{% endblock %}

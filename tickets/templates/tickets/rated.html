{% extends "base.html" %}
{% block title %}Thanks{% endblock %}
{% block body %}
<div class="public">
  <div class="public-card">
    <div class="public-brand"><strong>{{ brand_name }}</strong></div>
    <div class="card"><div class="bd" style="text-align:center;">
      <div class="rate-row" style="pointer-events:none;">
        {% for n in "12345" %}<span class="rate-star {% if forloop.counter <= rating %}on{% endif %}">★</span>{% endfor %}
      </div>
      <h1 style="margin-top:12px;">Thanks for the feedback!</h1>
      <p class="lede">We've recorded your {{ rating }}-star rating.</p>
    </div></div>
  </div>
</div>
{% endblock %}
